name: Signum Serialization Canary

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v5
      - name: Compatibility Canary (newest 1.10.x + latest Signum)
        run: |
          chmod +x tools/compat/run-signum-serialization-matrix.sh
          tools/compat/run-signum-serialization-matrix.sh --mode canary

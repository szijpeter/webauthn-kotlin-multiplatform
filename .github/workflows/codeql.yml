name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-actions:
    name: analyze (actions)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none
      - name: Analyze
        uses: github/codeql-action/analyze@v4

  skip-java-kotlin:
    name: skip (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Skip unsupported Kotlin CodeQL scan
        run: |
          echo "::notice::Skipping java-kotlin CodeQL scan because Kotlin 2.3.10 is not yet supported by the current CodeQL CLI on GitHub-hosted runners."

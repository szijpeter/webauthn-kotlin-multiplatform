name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Verify AI Harness Consistency
        run: |
          chmod +x tools/agent/*.sh .githooks/pre-commit .githooks/pre-push
          tools/agent/verify-harness-sync.sh

  detekt:
    runs-on: ubuntu-latest
    needs: [harness]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Detekt
        run: ./gradlew detekt :build-logic:detekt --stacktrace --continue
      - name: Upload Detekt Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          if-no-files-found: error
          path: |
            **/build/reports/detekt/*.xml
            **/build/reports/detekt/*.html

  jvm:
    runs-on: ubuntu-latest
    needs: [harness]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: JVM Checks
        run: ./gradlew check --stacktrace

  api-compatibility:
    runs-on: ubuntu-latest
    needs: [harness]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: API Check
        run: ./gradlew apiCheck --stacktrace

  android:
    runs-on: ubuntu-latest
    needs: [harness]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
      - name: Android Build
        run: ./gradlew :webauthn-client-android:assemble :samples:android-passkey:assemble :samples:compose-passkey-android:assemble :samples:compose-passkey-android:compileDebugAndroidTestKotlin --stacktrace

  ios-compile:
    runs-on: macos-latest
    needs: [harness]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: iOS Compile
        run: ./gradlew :webauthn-client-ios:compileKotlinIosSimulatorArm64 :samples:ios-passkey:compileKotlinIosSimulatorArm64 :samples:compose-passkey:compileKotlinIosSimulatorArm64 --stacktrace
      - name: iOS Host App Compile
        run: xcodebuild -project samples/compose-passkey-ios/ComposePasskeyIos.xcodeproj -scheme ComposePasskeyIos -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build

  release-preflight:
    runs-on: macos-latest
    needs: [harness, api-compatibility]
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish Preflight
        run: ./gradlew publishToMavenLocal -PsignAllPublications=false --stacktrace
      - name: Published Consumer Smoke Check
        run: bash tools/agent/check-published-consumer-smoke.sh

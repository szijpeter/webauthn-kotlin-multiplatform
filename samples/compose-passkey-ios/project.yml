name: ComposePasskeyIos
options:
  xcodeVersion: "16.0"
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
    CLANG_ENABLE_EXPLICIT_MODULES: NO
    PRODUCT_BUNDLE_IDENTIFIER: dev.webauthn.samples.composepasskey.ios
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  ComposePasskeyIos:
    type: application
    platform: iOS
    sources:
      - path: ComposePasskeyIos
    settings:
      base:
        PRODUCT_NAME: ComposePasskeyIos
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CADisableMinimumFrameDurationOnPhone: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    preBuildScripts:
      - name: Build ComposePasskeyShared framework
        script: |
          set -euo pipefail
          REPO_ROOT="$SRCROOT/../.."
          "$REPO_ROOT/gradlew" -p "$REPO_ROOT" :samples:compose-passkey:embedAndSignAppleFrameworkForXcode
    dependencies:
      - framework: "$SRCROOT/../compose-passkey/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/ComposePasskeyShared.framework"
        embed: false

schemes:
  ComposePasskeyIos:
    build:
      targets:
        ComposePasskeyIos: all
    run:
      config: Debug

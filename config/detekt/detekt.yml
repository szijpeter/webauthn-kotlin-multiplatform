# Detekt rollout rationale:
# - No baseline: we keep the gate clean with maxIssues=0 and fix/suppress intentionally.
# - Correctness-first rules stay on; this config only relaxes high-noise style/doc checks.
# - Complexity limits are currently set to existing project shape and will be tightened in follow-ups.
# - Exclusions are handled in Gradle task config (for generated/build outputs).
config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false
  excludes: []

comments:
  active: true
  # Public API docs are tracked via Dokka + docs process; enforcing KDoc presence here would
  # produce a large migration-only noise set unrelated to runtime correctness.
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  # Temporary migration thresholds for no-baseline adoption; tighten after focused refactors.
  ComplexCondition:
    active: true
    allowedConditions: 4
  CyclomaticComplexMethod:
    active: true
    allowedComplexity: 40
  LargeClass:
    active: true
    allowedLines: 2000
  LongMethod:
    active: true
    allowedLines: 140
  LongParameterList:
    active: true
    allowedFunctionParameters: 8
    allowedConstructorParameters: 10
    ignoreDefaultParameters: true
    ignoreDataClasses: true
  TooManyFunctions:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
    allowedFunctionsPerFile: 20
    allowedFunctionsPerClass: 20
    allowedFunctionsPerInterface: 20
    allowedFunctionsPerObject: 35
    allowedFunctionsPerEnum: 20

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false

naming:
  active: true
  MatchingDeclarationName:
    active: false
  FunctionNaming:
    active: true
    aliases: ['FunctionName']
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**']
    functionPattern: '[A-Za-z][a-zA-Z0-9]*'
    excludeClassPattern: '$^'
  VariableNaming:
    active: true
    aliases: ['PropertyName']
    variablePattern: '[a-zA-Z][A-Za-z0-9_]*'
    privateVariablePattern: '(_)?[a-zA-Z][A-Za-z0-9_]*'
    excludeClassPattern: '$^'

style:
  active: true
  # These are intentionally disabled for the first detekt rollout to avoid broad, low-signal churn.
  ReturnCount:
    active: false
  ThrowsCount:
    active: false
  UnusedParameter:
    active: false
  MagicNumber:
    active: false
  MaxLineLength:
    active: false
  NewLineAtEndOfFile:
    active: false

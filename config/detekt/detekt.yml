# Detekt tightening rationale:
# - No baseline: we keep the gate clean with maxIssues=0 and fix/suppress intentionally.
# - This profile is intentionally strict for production modules and excludes samples from
#   undocumented-public checks only.
# - Exclusions for generated/build outputs remain in Gradle task configuration.
config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false
  excludes: []

comments:
  active: true
  # Enforce public API documentation in production code, but exempt samples and tests.
  UndocumentedPublicClass:
    active: true
    excludes:
      [
        '**/samples/**',
        '**/test/**',
        '**/androidTest/**',
        '**/commonTest/**',
        '**/jvmTest/**',
        '**/androidUnitTest/**',
        '**/androidInstrumentedTest/**',
        '**/jsTest/**',
        '**/iosTest/**',
        '**/testFixtures/**',
        '**/webauthn-client-*/**',
        '**/webauthn-server-*/**',
        '**/webauthn-network-ktor-client/**',
        '**/webauthn-attestation-mds/**',
        '**/webauthn-cbor-internal/**',
      ]
  UndocumentedPublicFunction:
    active: false
    excludes: ['**/samples/**', '**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/testFixtures/**']
  UndocumentedPublicProperty:
    active: false
    excludes: ['**/samples/**', '**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/testFixtures/**']

complexity:
  active: true
  ComplexCondition:
    active: true
    allowedConditions: 4
  CyclomaticComplexMethod:
    active: true
    allowedComplexity: 15
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/testFixtures/**']
  LargeClass:
    active: true
    allowedLines: 600
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/testFixtures/**']
  LongMethod:
    active: true
    allowedLines: 70
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/testFixtures/**']
  LongParameterList:
    active: true
    allowedFunctionParameters: 6
    allowedConstructorParameters: 7
    ignoreDefaultParameters: false
    ignoreDataClasses: true
  TooManyFunctions:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/testFixtures/**']
    allowedFunctionsPerFile: 12
    allowedFunctionsPerClass: 12
    allowedFunctionsPerInterface: 12
    allowedFunctionsPerObject: 15
    allowedFunctionsPerEnum: 12

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/testFixtures/**']
    allowedExceptionNameRegex: '_|(ignore|expected).*'

naming:
  active: true
  MatchingDeclarationName:
    active: false
  FunctionNaming:
    active: true
    aliases: ['FunctionName']
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/testFixtures/**']
    functionPattern: '[A-Za-z][a-zA-Z0-9]*'
    excludeClassPattern: '$^'
  VariableNaming:
    active: true
    aliases: ['PropertyName']
    variablePattern: '[a-zA-Z][A-Za-z0-9_]*'
    privateVariablePattern: '(_)?[a-zA-Z][A-Za-z0-9_]*'
    excludeClassPattern: '$^'

style:
  active: true
  ReturnCount:
    active: true
    max: 10
    excludeGuardClauses: true
    excludedFunctions: ['equals', 'hashCode', 'toString']
  ThrowsCount:
    active: true
    max: 2
    excludeGuardClauses: true
  UnusedParameter:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/testFixtures/**']
    allowedNames: '(ignored|expected|serialVersionUID)'
  MagicNumber:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/testFixtures/**']
    ignoreNumbers: ['-1', '0', '1', '2']
  MaxLineLength:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/androidUnitTest/**', '**/androidInstrumentedTest/**', '**/jsTest/**', '**/iosTest/**', '**/testFixtures/**']
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
    excludeRawStrings: true
  NewLineAtEndOfFile:
    active: false
